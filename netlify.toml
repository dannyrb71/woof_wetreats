# Netlify build config — pins the Next.js app's location so the base
# directory can't be lost from the UI. The app lives in web/.
# The official @netlify/plugin-nextjs runtime is auto-installed when
# Netlify detects Next.js in the base directory, and it manages the
# publish/functions output (.next) automatically.
[build]
  base = "web"
  command = "npm run build"

# Explicitly enable the Next.js runtime so Netlify adapts the build output
# (SSR routes → serverless functions) instead of publishing raw source.
# Don't set `publish` manually — this plugin manages it (.next).
[[plugins]]
  package = "@netlify/plugin-nextjs"
